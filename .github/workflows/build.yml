name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Android SDK
        run: |
          # 下载 cmdline-tools
          curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            -o /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp
          mkdir -p $HOME/Android/Sdk/cmdline-tools/latest
          mv /tmp/cmdline-tools/* $HOME/Android/Sdk/cmdline-tools/latest/

          # 设置环境变量
          export ANDROID_HOME=$HOME/Android/Sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          # 接受许可并安装 SDK 组件
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: 安装 Gradle 8.7
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.7-bin.zip" \
            -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          echo "/tmp/gradle-8.7/bin" >> $GITHUB_PATH

      - name: 构建 Debug APK
        run: gradle assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekWidget-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
