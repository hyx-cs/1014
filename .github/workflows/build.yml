name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许在 GitHub Actions 页面手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: 安装 Gradle 8.7
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.7-bin.zip" \
            -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          echo "/tmp/gradle-8.7/bin" >> $GITHUB_PATH

      - name: 构建 Debug APK
        run: gradle assembleDebug

      - name: 上传 APK 到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekWidget-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
