name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        run: |
          # 使用 GitHub Runner 预装的 Android SDK
          export ANDROID_HOME=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          # 清除冲突的 ANDROID_SDK_ROOT
          echo "ANDROID_SDK_ROOT=" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          # 接受许可
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1

          # 安装需要的 SDK 组件（如果还没有）
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" 2>&1 | tail -5

          echo "SDK 就绪: $ANDROID_HOME"

      - name: 安装 Gradle
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.7-bin.zip" \
            -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          echo "/tmp/gradle-8.7/bin" >> $GITHUB_PATH

      - name: 构建 APK
        run: |
          # 确保只使用 ANDROID_HOME
          unset ANDROID_SDK_ROOT
          echo "ANDROID_HOME=$ANDROID_HOME"
          gradle assembleDebug --stacktrace

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekWidget-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
